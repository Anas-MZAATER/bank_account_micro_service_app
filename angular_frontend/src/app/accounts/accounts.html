<div class="p-3">
  <div class="card">
    <div class="card-body">
      @if (accounts){
        <table class="table table-striped">
          <thead><tr><th>ID</th><th>Balance</th><th>Type</th><th>Currency</th><th>Customer Name</th></tr></thead>
          <tbody>
            @for (acc of accounts; track acc.id){
              <tr>
                <td>{{acc.accountId}}</td>
                <td>{{acc.balance}}</td>
                <td>{{acc.acountType}}</td>
                <td>{{acc.currency}}</td>
                <td>{{acc.customer.lastName+" "+acc.customer.firstName}}</td>
              </tr>
            }
          </tbody>
        </table>
      }
    </div>
  </div>
</div>
